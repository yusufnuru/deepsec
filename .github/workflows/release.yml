name: Release

# Publishes `deepsec` to npm via OIDC Trusted Publishing — no NPM_TOKEN
# secret in the repo. The workflow proves its identity via a GitHub OIDC
# token; npm verifies it against a Trusted Publisher you register on
# npmjs.com.
#
# One-time setup on npmjs.com:
#   1. Visit https://www.npmjs.com/package/deepsec/access (must be a
#      maintainer of the package).
#   2. Under "Publishing access" → "Trusted Publisher", click Configure.
#   3. Pick "GitHub Actions" and fill in:
#        Organization or user:  vercel-labs
#        Repository:            deepsec
#        Workflow filename:     release.yml
#        Environment name:      (leave blank)
#   4. Save. From this point on, this workflow can publish without a token.
#
# Once a Trusted Publisher is set, an npm 2FA "automation" requirement is
# satisfied by the OIDC exchange — no separate write-OTP needed.
#
# Fires on every push to main. The paths filter narrows it to commits that
# touch the publish surface — the package.json (where the version lives) or
# the workflow itself. The version-vs-npm comparison below is the real gate;
# the filter is just an optimization to avoid spinning up a runner for every
# unrelated push.
on:
  push:
    branches: [main]
    paths:
      - 'packages/deepsec/package.json'
      - '.github/workflows/release.yml'

# Serialize releases. Two pushes landing on main back-to-back must not race
# each other into npm publish.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write  # required for npm OIDC trusted publishing + provenance
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # Compare the version in packages/deepsec/package.json with whatever is
      # currently published on npm. Skip if equal — re-running this workflow
      # on a no-op commit must not error or republish. Uses runner-preinstalled
      # node + npm so we don't have to set up a toolchain just to skip.
      - name: Resolve version delta
        id: ver
        run: |
          set -eo pipefail
          LOCAL=$(node -p "require('./packages/deepsec/package.json').version")
          PUBLISHED=$(npm view deepsec version 2>/dev/null || true)
          echo "local=$LOCAL" >> "$GITHUB_OUTPUT"
          if [ "$LOCAL" != "$PUBLISHED" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Will publish deepsec@$LOCAL (currently on npm: ${PUBLISHED:-<none>})"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "::notice::deepsec@$LOCAL already on npm — skipping publish"
          fi

      # Everything below only runs when there's a new version to ship. Gating
      # setup-node behind the version check avoids the pnpm-cache post-job
      # warning that fires when nothing was installed (no path to save).

      # pnpm version is read from `packageManager` in the root package.json.
      - if: steps.ver.outputs.publish == 'true'
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - if: steps.ver.outputs.publish == 'true'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - if: steps.ver.outputs.publish == 'true'
        run: pnpm install --frozen-lockfile

      # Trusted Publishing requires npm CLI ≥ 11.5.1. Node 24 LTS ships a
      # recent npm but the patch level drifts; upgrade to latest to be safe.
      - if: steps.ver.outputs.publish == 'true'
        run: npm install -g npm@latest

      # `npm publish` runs the package's prepublishOnly hook (`pnpm -w validate`)
      # and then prepack (`pnpm bundle`) — full validation + fresh bundle ship
      # together. With `id-token: write` set above and a Trusted Publisher
      # configured for `deepsec` on npmjs.com (see comment at top of file),
      # npm exchanges the GitHub OIDC token for a publish credential at
      # publish time. No NPM_TOKEN / NODE_AUTH_TOKEN secret is consulted.
      #
      # Note: --provenance is intentionally OFF. npm rejects provenance
      # uploads from repos whose GitHub visibility is "internal" or "private"
      # (E422 "Unsupported GitHub Actions source repository visibility").
      # Add --provenance once the repo is flipped to "public".
      - if: steps.ver.outputs.publish == 'true'
        working-directory: packages/deepsec
        run: npm publish --access public
