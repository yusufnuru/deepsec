name: E2E live sandbox

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: e2e-live-sandbox
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  pipeline-sandbox:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # The bundle is what gets exec'd by the e2e tests. Mirror the same
      # build that release.yml ships — keeps the live test honest about
      # what production users actually run.
      - run: pnpm bundle

      - name: Run live-sandbox pipeline test
        env:
          DEEPSEC_E2E_LIVE_SANDBOX: "1"
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: pnpm exec vitest run --project e2e e2e/pipeline-sandbox.test.ts
